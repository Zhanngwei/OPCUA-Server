# Web Server Configuration
server.port=8166
# Disable Tomcat APR to avoid version compatibility issues
server.tomcat.apr.enabled=false

# Logging Configuration - Dynamic based on system property
logging.level.root=ERROR
logging.level.org.eclipse.milo=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.go.show.multiproto.opcuaserver.OpcUaServerApplication=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n

# Log file configuration
logging.file.name=logs/opcua-server.log
logging.file.max-size=100MB
logging.file.max-history=10

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/opcua-nodes;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE;LOCK_TIMEOUT=10000;FILE_LOCK=SOCKET
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=scy_345

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for development/debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Node Persistence Configuration
opcua.persistence.enabled=true
opcua.persistence.auto-save=true

# Static Resources Configuration
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**
